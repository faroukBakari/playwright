repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
        exclude: tsconfig.*\.json$
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -lc 'fnm exec --using 22 -- npx eslint "$@"' --
        language: system
        files: \.tsx?$
        pass_filenames: true

      - id: typecheck
        name: typecheck
        entry: bash -c 'eval "$(fnm env)" && fnm use 22 && bash scripts/check-typecheck-baseline.sh'
        language: system
        pass_filenames: false
        files: ^packages/playwright-core/src/(server/chromium|mcp)/.*\.tsx?$
